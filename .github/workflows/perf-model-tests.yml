name: Perf Model Tests

on:
  push:
    branches: [main, "feat/**"]
    paths:
      - 'perf_models/**'
      - 'tests/**'
      - '.github/workflows/perf-model-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'perf_models/**'
      - 'tests/**'

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short

      - name: CLI smoke
        run: |
          python -m perf_models summary --chip all
          python -m perf_models kernel matmul --chip Discovery-1
          python -m perf_models workload llama --chip Prometheus --seq-len 128
          python -m perf_models thermal --chip Sentinel-1 --power 50

  lint:
    name: ruff lint (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: |
          ruff check perf_models/ tests/ || true
