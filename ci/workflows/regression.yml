name: Regression
'on':
  schedule:
  - cron: 0 3 * * *
  workflow_dispatch: {}
  pull_request:
    paths:
    - chip_ops/**
    - tests/regression/**
jobs:
  regression-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        chip:
        - sentinel-1
        - horizon-1
        - discovery-1
        - nexus-1
        - prometheus
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip
    - name: Install benchmarks
      run: 'pip install --upgrade pip

        pip install pytest pytest-benchmark numpy

        pip install -e . || true

        '
    - name: Run regression suite for ${{ matrix.chip }}
      run: 'python -m pytest tests/regression/ -k ''${{ matrix.chip }}'' -v --benchmark-only --benchmark-json=regression-${{
        matrix.chip }}.json || python -m pytest tests/regression/ -v || true

        '
    - name: Upload regression report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: regression-${{ matrix.chip }}
        path: regression-${{ matrix.chip }}.json
        if-no-files-found: ignore
