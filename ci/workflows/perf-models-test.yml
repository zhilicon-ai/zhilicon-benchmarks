name: Perf Models Test
'on':
  pull_request:
    paths:
    - chip_ops/**
    - perf_models/**
    - tests/**
  push:
    branches:
    - main
jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
        - '3.10'
        - '3.11'
        - '3.12'
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
    - name: Install
      run: 'pip install --upgrade pip

        pip install pytest pytest-cov pytest-benchmark numpy

        pip install -e . || true

        '
    - name: Run pytest
      run: 'python -m pytest tests/ -v --cov=. --cov-report=term-missing || python -m pytest tests/ -v

        '
